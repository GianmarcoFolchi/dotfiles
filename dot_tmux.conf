#Keybindings
unbind C-b
set-option -g prefix C-a
# split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

set -g mouse on

unbind r
bind r source-file ~/.tmux.conf

bind -r m resize-pane -Z

######################
### DESIGN CHANGES ###
######################
set -g default-terminal "screen-256color"

