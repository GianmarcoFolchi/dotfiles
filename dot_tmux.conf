#Keybindings

#remap prefix key 
unbind C-b
set-option -g prefix C-a

# split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

#allow mouse
set -g mouse on

#make tmux behave like vim in insert mode
set-window-option -g mode-keys vi

#go into copy mode with prefix [
bind-key -T copy-mode-vi 'v' send -X begin-selection # start selecting text with "v"
bind-key -T copy-mode-vi 'y' send -X copy-selection # copy text with "y"

unbind -T copy-mode-vi MouseDragEnd1Pane # don't exit copy mode when dragging with mouse

# remove delay for exiting insert mode with ESC in Neovim
set -sg escape-time 10

#easier sourcing
unbind r
bind r source-file ~/.tmux.conf

#change zoom action to m
bind -r m resize-pane -Z

#Plugins (after adding new plugins prefix shift I to install them)

#plugin manager
set -g @plugin 'tmux-plugins/tpm'

#easy navigation like vim 
set -g @plugin 'christoomey/vim-tmux-navigator'

#Design Changes
set -g default-terminal "screen-256color"


#init tmux plugin manager (Keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
